<!DOCTYPE html>
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Deskovky</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #121212;
  color: #fff;
  text-align: center;
  font-size: 20px;
  margin: 0;
  padding: 6px;
}

body {
  background: url("https://cc.cz/wp-content/uploads/2022/07/euthia-diea-3.jpg");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;

  background:
    radial-gradient(circle at center, rgba(0,0,0,0.35), rgba(0,0,0,0.85));

  pointer-events: none;
  z-index: 0;
}

.card {
  position: relative;
  z-index: 1;

  background: rgba(20,20,20,0.78);
  backdrop-filter: blur(3px);
  border: 1px solid rgba(255,255,255,0.06);
}

.card {
  background: linear-gradient(145deg, #1c1c1c, #141414);
  border-radius: 16px;
  padding: 12px;
  margin: 10px auto;
  max-width: 600px;

  box-shadow: 
    0 4px 10px rgba(0,0,0,0.5),
    inset 0 1px 1px rgba(255,255,255,0.05);

  border: 1px solid rgba(255,255,255,0.25);
}

/* nadpisy */
h2 {
  margin-top: 5px;
  margin-bottom: 8px;
}

/* hráči */
.players {
  display: inline-block;
  text-align: left;
}

.players label {
  display: block;
  margin: 5px 0;
  font-size: 18px;
}

/* mobil */
@media (max-width: 600px) {
  body {
    font-size: clamp(28px, 6vw, 40px);
  }
}

ul {
  list-style: none;
  padding: 0;
  margin-top: 8px;
}

li {
  margin: 6px 0;
  padding: 10px;
  border-radius: 12px;
  background: #2a2a2a;
  text-align: left;
  font-size: 19px;
}

.valid {
  background: #1f3d2b;
  color: #7CFC00;
  font-weight: bold;
}

.excluded {
  background: #3d1f1f;
  color: #ff6b6b;
}

/* checkbox */
input[type="checkbox"] {
  transform: scale(1.6);
  margin-right: 10px;
}

/* header hry */
.game-header {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* šipka */
.arrow {
  width: 20px;
  min-width: 20px;
  text-align: center;
  cursor: pointer;
  font-weight: bold;
}

/* TAGY — KLÍČ */
.game-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 5px;

  font-size: 16px;   /* 🔥 JEDNOTNÁ VELIKOST */
  line-height: 1.3;
}

.tag {
  background: #e6e6e6;
  color: #222;
  border: 1px solid rgba(0,0,0,0.08);
  font-style: italic;
  font-size: 13px;
  padding: 2px 7px;
  border-radius: 8px;
  font-weight: 400;  /* 👈 přebije bold z .valid */

}

/* "hráli všichni" */
.tag.all-played {
  font-style: italic;
}

/* tlačítka */
button {
  font-size: 16px;
  padding: 8px 14px;
  margin: 3px;
  border-radius: 10px;
  border: none;
  cursor: pointer;

  background: #2b2b2b;
  color: #fff;

  transition: all 0.2s ease;
}

button:hover {
  background: #3a3a3a;
  transform: translateY(-1px);
}

button:active {
  transform: scale(0.97);
}

#btnValid.active {
  background: #4CAF50;
}

#btnExcluded.active {
  background: #e53935;
}

/* statistiky */
#statsList {
  list-style: none;
  padding: 0;
  max-width: 500px;
  margin: 0 auto;
}

.stat-item {
  display: flex;
  justify-content: space-between;
  padding: 7px 10px;   /* 👈 menší než 10–12 */
  margin: 3px 0;       /* 👈 půlka původního prostoru */
  border-radius: 12px;
  background: linear-gradient(145deg, #222, #1a1a1a);
  border: 1px solid rgba(255,255,255,0.06);
  box-shadow: 0 2px 6px rgba(0,0,0,0.25);
  font-size: 18px;
  transition: transform 0.15s ease, background 0.15s ease;
}

.stat-item:hover {
  transform: translateY(-1px);
  background: #242424;
}
#statsList {
  font-size: 16px;
}

.stat-item.first { background: gold; color: black; }
.stat-item.second { background: silver; color: black; }
.stat-item.third { background: #cd7f32; color: black; }

#btnStats.active {
  background: #ffcc00 !important;
  color: black !important;
  font-weight: bold;
}

#sizeFilter label,
#allKnowWrapper label {
  font-size: 16px;
  line-height: 1.3;
}

.hidden {
  display: none !important;
}

.has-tooltip {
  cursor: pointer;
  font-weight: 600;
}

.has-tooltip::after {
  content: " ⓘ";
  font-size: 12px;
  opacity: 0.6;
}

.tooltip-content {
  margin-top: 4px;
  font-size: 14px;
  color: #aaa;
  text-align: right;
}

.hidden {
  display: none;
}

#btnAll.active {
  background: #4fc3f7;   /* světle modrá */
  color: black;
  font-weight: bold;
}

.tooltip-content {
  margin-top: 6px;
  font-size: 14px;
  color: #ccc;
  text-align: right;
}

.stat-item strong {
  font-weight: 700;
  opacity: 0.9;
}

#statsList > div {
  margin-bottom: 14px;
}

.stat-item span {
  opacity: 0.9;
}

#filtersRow > div {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 6px;
}

#filtersRow label {
  font-size: 16px;
  font-weight: 400;
  color: #fff;
}

.players {
  display: inline-grid;
  grid-template-columns: repeat(4, max-content);
  gap: 6px 14px;

  text-align: left;
  margin: 0 auto;
}

/* mobil */
@media (max-width: 600px) {
  .players {
    grid-template-columns: repeat(2, max-content);
  }
}

h2 {
  font-family: 'Great Vibes', cursive;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: none;

  color: rgba(255,255,255,0.9);

  text-shadow: 0 2px 10px rgba(0,0,0,0.6);

  margin: 10px 0 8px 0;
  padding: 0;

  background: none;
  border: none;
}

#sizeFilter {

}

#btnAllKnow.active {
  background: #4CAF50;  /* stejná zelená */
  color: white;
  font-weight: normal;
}

#btnAllKnow {
  font-size: 14px;
  padding: 2px 6px;
  border-radius: 6px;
}

#allKnowWrapper button {
  font-size: 16px;
  padding: 8px 14px;
  border-radius: 10px;
}

</style>

function getStar(game) {
  const allPlayers = Object.values(playersMap);

  // 1) nikdo nesmí mít BAN
  const hasBan = Object.keys(blacklist).some(player =>
    blacklist[player]?.includes(game.name)
  );

  if (hasBan) return "";

  // 2) všichni hráči to musí "znát"
  const knowsAll = allPlayers.every(code =>
    game.knows?.includes(code)
  );

  if (knowsAll) return "⭐ ";

  return "";
}

function updateAllGames() {

const selectedOwner = document.getElementById("ownerSelect").value;

document.getElementById("playersCard").style.display = "none";

  const list = document.getElementById("allGamesList");
  list.innerHTML = "";

  const selectedSizes = [...document.querySelectorAll('#sizeFilter input:checked')]
    .map(e => e.value);

  const selectedCount = document.getElementById("playerCountSelect").value;

  games.forEach(game => {

    // filtr velikosti
    if (!selectedSizes.includes(game.size)) return;

    // filtr počtu hráčů
    if (selectedCount !== "all" && !game.players.includes(Number(selectedCount))) return;

    if (selectedOwner !== "all" && !game.owners.includes(selectedOwner)) return;

    let banPlayers = [];
    let unknownPlayers = [];

    Object.keys(playersMap).forEach(player => {

      // BAN
      if (blacklist[player]?.includes(game.name)) {
        banPlayers.push(player);
      }

      // NEZNÁ
      const code = playersMap[player];

      if (!game.knows?.includes(code)) {
        unknownPlayers.push(player);
      }

    });

    const li = document.createElement("li");

    li.innerHTML = `
     <div class="game-header">
  <span class="arrow">▶</span>
  <span>${game.name}${getStar(game)}</span>
</div>

      <div class="game-reason" style="display:none;">
        <div class="game-tags">
          <span class="tag">hráči: ${game.players.join(", ")}</span>
         <span class="tag">majitel: ${
  game.owners.map(o => 
    Object.keys(playersMap).find(p => playersMap[p] === o)
  ).join(", ")
}</span>
          ${banPlayers.length ? `<span class="tag">BAN: ${banPlayers.join(", ")}</span>` : ""}
         
${
  unknownPlayers.length === 0
    ? `<span class="tag all-played">hráli: všichni</span>`
    : unknownPlayers.length === Object.keys(playersMap).length
      ? `<span class="tag">nehrál: nikdo</span>`
      : `<span class="tag">nehrál: ${unknownPlayers.join(", ")}</span>`
}

        </div>
      </div>
    `;

    li.querySelector(".game-header").addEventListener("click", () => {
      const detail = li.querySelector(".game-reason");
      const arrow = li.querySelector(".arrow");

      const open = detail.style.display === "block";
      detail.style.display = open ? "none" : "block";
      arrow.textContent = open ? "▶" : "▼";
    });

    list.appendChild(li);

  });
}

    const visible = sorted.slice(0, 3);
    const hidden = sorted.slice(3);

    visible.forEach(([name, s], i) => {
      const div = document.createElement("div");

      div.className = "stat-item";
      if (i === 0) div.classList.add("first");
      if (i === 1) div.classList.add("second");
      if (i === 2) div.classList.add("third");

      div.innerHTML = `
  <span>${i + 1}. ${name}</span>
  <strong>${useX ? "x" : ""}${s[key]}</strong>
`;

      container.appendChild(div);
    });

    if (hidden.length > 0) {

      const moreBtn = document.createElement("div");
      moreBtn.innerHTML = "▼ zobrazit více";
      moreBtn.style.cursor = "pointer";
      moreBtn.style.textAlign = "center";
      moreBtn.style.margin = "8px";
      moreBtn.style.color = "#ffcc00";

      const hiddenContainer = document.createElement("div");
      hiddenContainer.style.display = "none";

      hidden.forEach(([name, s], i) => {
        const div = document.createElement("div");

        div.className = "stat-item";

        div.innerHTML = `
          <span>${i + 4}. ${name}</span>
          <strong>${s[key]}</strong>
        `;

        hiddenContainer.appendChild(div);
      });

      moreBtn.addEventListener("click", () => {
        const open = hiddenContainer.style.display === "block";
        hiddenContainer.style.display = open ? "none" : "block";
        moreBtn.innerHTML = open ? "▼ zobrazit více" : "▲ skrýt";
      });

      container.appendChild(moreBtn);
      container.appendChild(hiddenContainer);
    }

    statsList.appendChild(container);
  }

  const entries = Object.entries(stats);

  addSection("🎲 Počet her", entries, "owns");
  addSection("👑 Unikátní hry", entries, "unique");
  addSection("👥 Duplicitní hry", entries, "duplicateGamesUnique");
//addSection("🏆 Top hry",
  //Object.entries(topCurators).map(([name, value]) => [name, { value }]),
  //"value"
 const groupEntries = Object.entries(groupStats)
  .map(([key, value]) => [key, { value }])
  .sort((a, b) => b[1].value - a[1].value);
  addSection("🧑‍🤝‍🧑 Duplicitní hry - skupiny", groupEntries, "value");
  
  addSection("🧠 Znalost pravidel", entries, "knows");
  addSection("🙈 Neznalost vlastních her", entries, "ownsButDoesntKnow");
  addSection("⚠️ Nejvíc blokuje", entries, "blocks");
  addSection("💀 Nejvíc blokovaný", entries, "bannedGames");

  addSection("🔁 Duplicitní tituly", duplicateEntries, "value", true);
 const filteredGames = Object.entries(gameBanStats)
    .filter(([name, value]) => value > 0)
    .map(([name, value]) => [name, { value }]);

  addSection("🔒 Blokované tituly", filteredGames, "value", true);

 }
