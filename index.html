<!DOCTYPE html>
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Deskovky</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #121212;
  color: #fff;
  text-align: center;
  font-size: 20px;
  margin: 0;
  padding: 6px;
}

.card {
  background: linear-gradient(145deg, #1c1c1c, #141414);
  border-radius: 16px;
  padding: 12px;
  margin: 10px auto;
  max-width: 600px;

  box-shadow: 
    0 4px 10px rgba(0,0,0,0.5),
    inset 0 1px 1px rgba(255,255,255,0.05);

  border: 1px solid rgba(255,255,255,0.05);
}

/* nadpisy */
h2 {
  margin-top: 5px;
  margin-bottom: 8px;
}

/* hráči */
.players {
  display: inline-block;
  text-align: left;
}

.players label {
  display: block;
  margin: 5px 0;
}

/* mobil */
@media (max-width: 600px) {
  body {
    font-size: clamp(28px, 6vw, 40px);
  }
}

ul {
  list-style: none;
  padding: 0;
  margin-top: 8px;
}

li {
  margin: 6px 0;
  padding: 10px;
  border-radius: 12px;
  background: #2a2a2a;
  text-align: left;
}

.valid {
  background: #1f3d2b;
  color: #7CFC00;
  font-weight: bold;
}

.excluded {
  background: #3d1f1f;
  color: #ff6b6b;
}

/* checkbox */
input[type="checkbox"] {
  transform: scale(1.6);
  margin-right: 10px;
}

/* header hry */
.game-header {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* šipka */
.arrow {
  width: 20px;
  min-width: 20px;
  text-align: center;
  cursor: pointer;
  font-weight: bold;
}

/* TAGY — KLÍČ */
.game-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 5px;

  font-size: 16px;   /* 🔥 JEDNOTNÁ VELIKOST */
  line-height: 1.3;
}

.tag {
  font-size: inherit; /* 🔥 bere velikost z .game-tags */
  padding: 2px 6px;
  border-radius: 10px;
  background: #444;
  color: white;
}

/* "hráli všichni" */
.tag.all-played {
  font-style: italic;
  opacity: 0.8;
}

/* tlačítka */
button {
  font-size: 16px;
  padding: 8px 14px;
  margin: 3px;
  border-radius: 10px;
  border: none;
  cursor: pointer;

  background: #2b2b2b;
  color: #fff;

  transition: all 0.2s ease;
}

button:hover {
  background: #3a3a3a;
  transform: translateY(-1px);
}

button:active {
  transform: scale(0.97);
}

#btnValid.active {
  background: #4CAF50;
}

#btnExcluded.active {
  background: #e53935;
}

/* statistiky */
#statsList {
  list-style: none;
  padding: 0;
  max-width: 500px;
  margin: 0 auto;
}

.stat-item {
  display: flex;
  justify-content: space-between;
  padding: 10px 14px;
  margin: 6px 0;
  border-radius: 10px;
  background: #1e1e1e;
}

.stat-item.first { background: gold; color: black; }
.stat-item.second { background: silver; color: black; }
.stat-item.third { background: #cd7f32; color: black; }

#btnStats.active {
  background: #ffcc00 !important;
  color: black !important;
  font-weight: bold;
}

#sizeFilter label,
#allKnowWrapper label {
  font-size: 16px;
  line-height: 1.3;
}

.hidden {
  display: none !important;
}

.has-tooltip {
  cursor: help;
  text-decoration: underline dotted;
}

</style>
</head>

function update() {

if (currentMode === "stats") {
  return;
}

if (document.getElementById("statsList").style.display === "block") {
  document.getElementById("validGames").innerHTML = "";
  document.getElementById("excludedGames").innerHTML = "";
  return;
}

 const selectedSizes = [...document.querySelectorAll('#sizeFilter input:checked')]
  .map(e => e.value);

const selected = [...document.querySelectorAll(".players input:checked")]
  .map(e => e.value);

  const validList = document.getElementById("validGames");
  const excludedList = document.getElementById("excludedGames");
  const statsList = document.getElementById("statsList");

  validList.innerHTML = "";
  excludedList.innerHTML = "";
  statsList.innerHTML = ""; // 🔥 důležité (čistí stats)

  const count = selected.length;
  if (count === 0) return;

  let letters = selected.map(p => playersMap[p]);
  const allKnow = document.getElementById("allKnowToggle").checked;

  games.forEach(game => {

    if (!selectedSizes.includes(game.size)) return;

    if (!game.players.includes(count)) return;
    if (!game.owners.some(o => letters.includes(o))) return;

    let banPlayers = [];
    let unknowingPlayers = [];

    for (let player of selected) {
      if (blacklist[player]?.includes(game.name)) {
        banPlayers.push(player);
      }
    }

if (game.knows && game.knows.length > 0) {
  for (let player of selected) {
    let code = playersMap[player];

    if (!game.knows.includes(code)) {
      unknowingPlayers.push(player);
    }
  }
} else {
  // 👉 nikdo hru nezná
  unknowingPlayers = [...selected];
}

    const nobodyKnows = unknowingPlayers.length === selected.length && selected.length > 0;
    const hasBan = banPlayers.length > 0;
    const hasUnknown = unknowingPlayers.length > 0;

    const li = document.createElement("li");

// 🔴 1) BAN nebo nikdo nezná → vždy vyřadit

if (hasBan || nobodyKnows) {

  let reasons = [];

  if (hasBan) {
    reasons.push("BAN: " + banPlayers.join(", "));
  }

if (nobodyKnows) {
  reasons.push("nehrál: nikdo");
}

if (allKnow && hasUnknown && !nobodyKnows) {
  reasons.push("nehrál: " + unknowingPlayers.join(", "));
}
  li.classList.add("excluded");

  li.innerHTML = `
    <div class="game-header">
      <span class="arrow">▶</span>
      <span>${game.name}</span>
    </div>

    <div class="game-reason" style="display:none;">
      <div class="game-tags">
        ${reasons.map(r => `<span class="tag">${r}</span>`).join("")}
      </div>
    </div>
  `;

  li.querySelector(".game-header").addEventListener("click", () => {
    const reason = li.querySelector(".game-reason");
    const arrow = li.querySelector(".arrow");

    const open = reason.style.display === "block";

    reason.style.display = open ? "none" : "block";
    arrow.textContent = open ? "▶" : "▼";
  });

  excludedList.appendChild(li);
  return;
}


// 🟡 2) někdo nezná (ale ne všichni) → jen když je zapnuté "hráli všichni"

if (allKnow && hasUnknown) {

  li.classList.add("partial");

  li.innerHTML = `
    <div class="game-header">
      <span class="arrow">▶</span>
      <span>${game.name}</span>
    </div>

    <div class="game-reason" style="display:none;">
      <div class="game-tags">
        <span class="tag">nehrál: ${unknowingPlayers.join(", ")}</span>
      </div>
    </div>
  `;

  li.querySelector(".game-header").addEventListener("click", () => {
    const reason = li.querySelector(".game-reason");
    const arrow = li.querySelector(".arrow");

    const open = reason.style.display === "block";

    reason.style.display = open ? "none" : "block";
    arrow.textContent = open ? "▶" : "▼";
  });

  validList.appendChild(li);
  return;
}


// 🟢 3) VALID
li.classList.add("valid");

li.innerHTML = `
  <div class="game-header">
    <span class="arrow"></span>
    <span>${game.name}</span>
  </div>
`;

validList.appendChild(li);

 });

}

// 🔥 STATISTIKY
function updateStats() {

  const uniqueGames = {};
  const statsList = document.getElementById("statsList");
  statsList.innerHTML = "";

  let stats = {};

  // 👇 init stats
  Object.keys(playersMap).forEach(p => {
    stats[p] = {
      owns: 0,
      unique: 0,
      doesntKnow: 0,
      ownsButDoesntKnow: 0,
      blocks: 0,
      bannedGames: 0,
      duplicates: 0
    };
  });

  // 👇 BAN per game + kdo banoval (pro tooltip)
  const gameBanStats = {};
  const gameBanUsers = {};

  games.forEach(game => {

    if (uniqueGames[game.name]) return;
    uniqueGames[game.name] = true;

    let banCount = 0;

    Object.entries(blacklist).forEach(([player, list]) => {
      if (list.includes(game.name)) {

        banCount++;

        if (!gameBanUsers[game.name]) {
          gameBanUsers[game.name] = [];
        }

        gameBanUsers[game.name].push(player);
      }
    });

    gameBanStats[game.name] = banCount;

    // 🟢 OWNERS
    game.owners.forEach(o => {
      const name = Object.keys(playersMap).find(p => playersMap[p] === o);
      if (name) stats[name].owns++;
    });

    // 🟡 UNIQUE OWNER
    if (game.owners.length === 1) {
      const only = Object.keys(playersMap).find(p => playersMap[p] === game.owners[0]);
      if (only) stats[only].unique++;
    }

    // 🧠 KNOWLEDGE
    Object.keys(playersMap).forEach(p => {
      const code = playersMap[p];

      if (!game.knows?.includes(code)) {
        stats[p].doesntKnow++;

        if (game.owners.includes(code)) {
          stats[p].ownsButDoesntKnow++;
        }
      }
    });

  });

  // 🔥 BAN hráčů (unikátní hry)
  const bannedSet = {};

  Object.keys(playersMap).forEach(p => {
    bannedSet[p] = new Set();
  });

  games.forEach(game => {

    game.owners.forEach(ownerCode => {

      const ownerName = Object.keys(playersMap).find(p => playersMap[p] === ownerCode);
      if (!ownerName) return;

      Object.entries(blacklist).forEach(([otherPlayer, list]) => {

        if (list.includes(game.name)) {
          bannedSet[ownerName].add(game.name);
        }

      });

    });

  });

  Object.keys(bannedSet).forEach(p => {
    stats[p].bannedGames = bannedSet[p].size;
  });

  // 🔥 DUPLIKÁTY
  games.forEach(game => {

    if (game.owners.length > 1) {
      const uniqueOwners = [...new Set(game.owners)];

      uniqueOwners.forEach(o => {
        const name = Object.keys(playersMap).find(p => playersMap[p] === o);

        if (name) {
          stats[name].duplicates++;
        }
      });
    }

  });

  // 🚫 BLOCKS
  Object.entries(blacklist).forEach(([player, list]) => {
    if (stats[player]) {
      stats[player].blocks = list.length;
    }
  });

  // 🏆 VÝPIS
function addSection(title, arr, key, withTooltip = false) {

  const h = document.createElement("li");
  h.innerHTML = `<strong>${title}</strong>`;
  statsList.appendChild(h);

  const container = document.createElement("div");

  const sorted = arr.sort((a, b) => b[1][key] - a[1][key]);

  const visible = sorted.slice(0, 3);
  const hidden = sorted.slice(3);

  visible.forEach(([name, s], i) => {
    const div = document.createElement("div");

    div.className = "stat-item";
    if (i === 0) div.classList.add("first");
    if (i === 1) div.classList.add("second");
    if (i === 2) div.classList.add("third");

    div.innerHTML = `
      <span>${i + 1}. ${name}</span>
      <strong 
        ${withTooltip ? `title="${gameBanUsers[name]?.join(", ") || ""}" class="has-tooltip"` : ""}
      >
        ${s[key]}
      </strong>
    `;

    container.appendChild(div);
  });

  if (hidden.length > 0) {

    const moreBtn = document.createElement("div");
    moreBtn.innerHTML = "▼ zobrazit více";
    moreBtn.style.cursor = "pointer";
    moreBtn.style.textAlign = "center";
    moreBtn.style.margin = "8px";
    moreBtn.style.color = "#ffcc00";

    const hiddenContainer = document.createElement("div");
    hiddenContainer.style.display = "none";

    hidden.forEach(([name, s], i) => {
      const div = document.createElement("div");

      div.className = "stat-item";

      div.innerHTML = `
        <span>${i + 4}. ${name}</span>
        <strong 
          ${withTooltip ? `title="${gameBanUsers[name]?.join(", ") || ""}" class="has-tooltip"` : ""}
        >
          ${s[key]}
        </strong>
      `;

      hiddenContainer.appendChild(div);
    });

    moreBtn.addEventListener("click", () => {
      const open = hiddenContainer.style.display === "block";
      hiddenContainer.style.display = open ? "none" : "block";
      moreBtn.innerHTML = open ? "▼ zobrazit více" : "▲ skrýt";
    });

    container.appendChild(moreBtn);
    container.appendChild(hiddenContainer);
  }

  statsList.appendChild(container);
}

  const entries = Object.entries(stats);

 addSection("🎲 Celkem her", entries, "owns");
addSection("😂 Neumí svoje", entries, "ownsButDoesntKnow");
addSection("⚠️ Nejvíc blokuje", entries, "blocks");
addSection("💀 Nejvíc blokovaný", entries, "bannedGames");

  // 🔥 BANované hry (jen >0)
  const filteredGames = Object.entries(gameBanStats)
    .filter(([name, value]) => value > 0)
    .map(([name, value]) => [name, { value }]);

  addSection("⚠️ Blokované hry", filteredGames, "value", true);
}
