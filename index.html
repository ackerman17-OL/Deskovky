function toggleExcluded() {
  const el = document.getElementById("excludedGames");
  el.style.display = (el.style.display === "none") ? "block" : "none";
}

function update() {

  const selected = [...document.querySelectorAll("input:checked")].map(e => e.value);
  const count = selected.length;

  const validList = document.getElementById("validGames");
  const excludedList = document.getElementById("excludedGames");

  validList.innerHTML = "";
  excludedList.innerHTML = "";

  if (count === 0) return;

  let letters = selected.map(p => playersMap[p]);

  // SDÍLENÍ HER (T → M)
  if (selected.includes("Míša") && !selected.includes("Tacit")) {
    letters.push("T");
  }

  const validGames = games.filter(game => {

    if (game.players !== count) return false;

    for (let player of selected) {
      if (blacklist[player]?.includes(game.name)) return false;
    }

    if (!game.owners.some(o => letters.includes(o))) return false;

    return true;
  });

  games.filter(g => g.players === count).forEach(game => {

    const li = document.createElement("li");
    li.innerHTML = game.name;

    if (validGames.includes(game)) {

  li.classList.add("valid");
  li.style.fontWeight = "bold";
  validList.appendChild(li);

} else {

  // zjisti kdo hru vyřadil
  let blockers = [];

  for (let player of selected) {
    if (blacklist[player]?.includes(game.name)) {
      blockers.push(player);
    }
  }

  li.innerHTML = game.name + " ❌ (" + blockers.join(", ") + ")";

  li.classList.add("excluded");
  li.style.textDecoration = "line-through";

  excludedList.appendChild(li);
}

  });

}
