<style>
body {
  font-family: Arial, sans-serif;
  background: #121212;
  color: #fff;
  text-align: center;
  font-size: 20px;
  margin: 0;
  padding: 10px;
}

.card {
  background: #1e1e1e;
  border-radius: 20px;
  padding: 15px;
  margin: 15px auto;
  max-width: 600px;
}

.players {
  display: inline-block;
  text-align: left;
}

.players label {
  display: block;
  margin: 8px 0;
}
@media (max-width: 600px) {
  body {
    font-size: clamp(28px, 6vw, 40px);
  }
}

ul {
  list-style: none;
  padding: 0;
}

li {
  margin: 10px 0;
  padding: 10px;
  border-radius: 12px;
  background: #2a2a2a;
}

.valid {
  background: #1f3d2b;
  color: #7CFC00;
  font-weight: bold;
}

.excluded {
  background: #3d1f1f;
  color: #ff6b6b;
}

input[type="checkbox"] {
  transform: scale(1.6);
  margin-right: 10px;
}

.game-header {
  display: flex;
  align-items: center;
  gap: 10px;
}

.arrow {
  cursor: pointer;
  font-weight: bold;
}

.excluded .game-header {
  justify-content: center;
}

.game-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 5px;
  justify-content: center;
}

.tag {
  padding: 3px 8px;
  border-radius: 10px;
  background: #444;
  color: white;
  font-size: 13px;
}

button.active {
  font-weight: bold;
}

button {
  font-size: 16px;
  padding: 8px 14px;
  margin: 4px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  background: #fff;
  color: #000;
}

button.active-valid {
  background: #4CAF50;
  color: #fff;
}

button.active-excluded {
  background: #e53935;
  color: #fff;
}

#btnValid.active {
  background: #4CAF50;
  color: #fff;
}

#btnExcluded.active {
  background: #e53935;
  color: #fff;
}

</style>
</head>

function update() {

  const selected = [...document.querySelectorAll("input[type=checkbox]:checked")]
    .filter(e => e.id !== "allKnowToggle")
    .map(e => e.value);

  const validList = document.getElementById("validGames");
  const excludedList = document.getElementById("excludedGames");

  validList.innerHTML = "";
  excludedList.innerHTML = "";

  const count = selected.length;
  if (count === 0) return;

  let letters = selected.map(p => playersMap[p]);
  const allKnow = document.getElementById("allKnowToggle").checked;

  games.forEach(game => {

    // 1. počet hráčů
    if (game.players !== count) return;

    // 2. majitel
    if (!game.owners.some(o => letters.includes(o))) return;

    let banPlayers = [];
    let unknowingPlayers = [];

    // 3. BAN
    for (let player of selected) {
      if (blacklist[player]?.includes(game.name)) {
        banPlayers.push(player);
      }
    }

    // 4. NEUMÍ (jen když je zapnuto "všichni hráli")
    if (allKnow && game.knows) {
      for (let player of selected) {
        let code = playersMap[player];

        if (!game.knows.includes(code)) {
          unknowingPlayers.push(player);
        }
      }
    }

    const hasBan = banPlayers.length > 0;
    const hasUnknown = unknowingPlayers.length > 0;

    const li = document.createElement("li");

    // 🟢 VALID (žádný problém)
    if (!hasBan && (!allKnow || !hasUnknown)) {

      li.classList.add("valid");

      li.innerHTML = `<div class="game-header"><span>${game.name}</span></div>`;

      validList.appendChild(li);
      return;
    }

    // 🟡 ČÁSTEČNĚ (někdo nezná)
    if (hasUnknown && allKnow) {

      li.classList.add("partial");

      li.innerHTML = `
        <div class="game-header">
          <span class="arrow">▶</span>
          <span>${game.name}</span>
        </div>

        <div class="game-reason" style="display:none;">
          <div class="game-tags">
            ${unknowingPlayers.map(p => `<span class="tag">${p} nezná</span>`).join("")}
          </div>
        </div>
      `;

      li.querySelector(".game-header").addEventListener("click", (e) => {
        e.stopPropagation();

        const reason = li.querySelector(".game-reason");
        const arrow = li.querySelector(".arrow");

        const open = reason.style.display === "block";

        reason.style.display = open ? "none" : "block";
        arrow.textContent = open ? "▶" : "▼";
      });

      validList.appendChild(li);
      return;
    }

    // 🔴 VYŘAZENO
    let reasons = [];

    if (hasBan) reasons.push("BAN: " + banPlayers.join(", "));
    if (hasUnknown) reasons.push("nehrál: " + unknowingPlayers.join(", "));

    li.classList.add("excluded");

    li.innerHTML = `
      <div class="game-header">
        <span class="arrow">▶</span>
        <span>${game.name}</span>
      </div>

      <div class="game-reason" style="display:none;">
        <div class="game-tags">
          ${reasons.map(r => `<span class="tag">${r}</span>`).join("")}
        </div>
      </div>
    `;

    li.querySelector(".game-header").addEventListener("click", (e) => {
      e.stopPropagation();

      const reason = li.querySelector(".game-reason");
      const arrow = li.querySelector(".arrow");

      const open = reason.style.display === "block";

      reason.style.display = open ? "none" : "block";
      arrow.textContent = open ? "▶" : "▼";
    });

    excludedList.appendChild(li);
  });
}

document.querySelectorAll("input").forEach(cb => {
  cb.addEventListener("change", update);
});

function showValid() {
  validGames.style.display = "block";
  excludedGames.style.display = "none";
  btnValid.classList.add("active");
  btnExcluded.classList.remove("active");
}

function showExcluded() {
  validGames.style.display = "none";
  excludedGames.style.display = "block";
  btnExcluded.classList.add("active");
  btnValid.classList.remove("active");
}

btnValid.addEventListener("click", showValid);
btnExcluded.addEventListener("click", showExcluded);

update();
showValid();

</script>
